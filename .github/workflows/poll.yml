# --- Easy settings you can edit right here, no code changes needed ---
#   Check frequency: this workflow no longer schedules itself (GitHub's own
#     cron scheduler proved too unreliable -- it went hours without firing).
#     It's triggered from the outside on an hourly cadence instead, and can
#     always be run manually too (Actions tab -> Poll world events -> Run
#     workflow). There should only be ONE thing triggering it regularly --
#     multiple overlapping timers just pile up runs behind each other.
#   Turn a source on/off: change ENABLE_USGS / ENABLE_GDACS / ENABLE_RSS to
#     "true" or "false" below.
#   Earthquake filter: raise/lower USGS_MIN_MAGNITUDE (currently 4.5 --
#     only earthquakes at or above this size get posted).
#   Disaster severity filter: GDACS_MIN_SEVERITY (currently 2 -- 1=Green,
#     2=Orange, 3=Red; Green fires constantly worldwide and is skipped).
#   Message pacing: DISCORD_PACE_WINDOW_MINUTES (currently 52) -- new events
#     post at randomized moments (never less than 4 minutes apart) spread
#     across roughly this many minutes, instead of all at once. That
#     4-minute minimum also covers the gap since the previous run's last
#     post, so two runs close together won't both post the instant they see
#     something new. Nothing is ever left for the next run: if there isn't
#     enough of the budget to give every event its own message, extra
#     events get bundled a few at a time into the same message for some of
#     the slots instead. Keep the budget comfortably below an hour (there's
#     only one check per hour) so a run reliably finishes before the next
#     one starts. Events always post in the order they happened (oldest
#     first), not the order they were noticed.
#   Add/remove/edit news feeds: edit alerts/config/feeds.yaml instead.
#   Dev vs. prod channels: DISCORD_WEBHOOK_URL is "dev" (gets every notable
#     event, including new sources on trial). DISCORD_WEBHOOK_URL_2 is
#     "prod" (only gets events also flagged prod_ready -- see feeds.yaml's
#     `prod:` field per source). DISCORD_PROD_ENABLED is the master switch
#     for the whole prod tier -- while it's "false", prod gets NOTHING no
#     matter what any source's `prod` flag says. Only flip it to "true"
#     once you're ready for prod to start receiving anything at all; even
#     then, each source still needs its own `prod: true` in feeds.yaml to
#     actually reach it.
#   Skip a pile of old news (e.g. after the bot was off for a while): run
#     the separate "Clear backlog" workflow once (Actions tab) -- it marks
#     everything currently pending as seen without posting it, so the next
#     normal run only picks up what happens from that point on.
#   TEMPORARY fast-dev catch-up: DISCORD_DEV_MIN_INTERVAL_SECONDS and
#     DISCORD_DEV_PACE_WINDOW_MINUTES below override the normal pacing for
#     the dev channel ONLY (prod, when it's ever turned on, always uses the
#     normal DISCORD_PACE_WINDOW_MINUTES/4-minute settings regardless).
#     Useful for clearing a big one-off batch in dev fast instead of
#     waiting out the human-paced timing -- delete both lines (or comment
#     them out) once dev has caught up, to go back to normal dev pacing.
name: Poll world events

on:
  workflow_dispatch: {}

concurrency:
  # If a check is still running (e.g. mid-way through pacing out messages)
  # when the next one is triggered, queue it instead of running both at
  # once -- avoids two runs racing on the same dedupe state.
  group: poll-world-events
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: alerts/state
          key: alerts-state-${{ github.run_id }}
          restore-keys: |
            alerts-state-

      - name: Poll sources and post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_2: ${{ secrets.DISCORD_WEBHOOK_URL_2 }}
          DISCORD_PROD_ENABLED: "false"
          ENABLE_USGS: "true"
          ENABLE_GDACS: "true"
          ENABLE_RSS: "true"
          USGS_MIN_MAGNITUDE: "4.5"
          GDACS_MIN_SEVERITY: "2"
          DISCORD_PACE_WINDOW_MINUTES: "52"
          DISCORD_DEV_MIN_INTERVAL_SECONDS: "15"   # TEMPORARY -- see note above
          DISCORD_DEV_PACE_WINDOW_MINUTES: "5"     # TEMPORARY -- see note above
        run: python -m alerts.run --sinks discord

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: alerts/state
          key: alerts-state-${{ github.run_id }}
