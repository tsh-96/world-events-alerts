# --- Easy settings you can edit right here, no code changes needed ---
#   Check frequency: edit the cron line below (e.g. "*/5 * * * *" = every 5
#     min, "*/30 * * * *" = every 30 min, "0 * * * *" = every hour).
#   Turn a source on/off: change ENABLE_USGS / ENABLE_GDACS / ENABLE_RSS to
#     "true" or "false" below.
#   Earthquake filter: raise/lower USGS_MIN_MAGNITUDE (currently 4.5 --
#     only earthquakes at or above this size get posted).
#   Disaster severity filter: GDACS_MIN_SEVERITY (currently 2 -- 1=Green,
#     2=Orange, 3=Red; Green fires constantly worldwide and is skipped).
#   Message pacing: DISCORD_PACE_WINDOW_MINUTES (currently 45) -- when a
#     check finds several new events at once, they post at randomized
#     moments (never less than 4 minutes apart) spread across roughly this
#     many minutes, instead of all at once. If there are more new events
#     than fit in the budget at that minimum spacing, the extras are left
#     for the next check rather than stretching this run out further. Keep
#     the budget a bit below the check frequency above (e.g. under 60 min
#     if checks are hourly) so one check finishes before the next begins.
#   Add/remove/edit news feeds: edit alerts/config/feeds.yaml instead.
name: Poll world events

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  # If a check is still running (e.g. mid-way through pacing out messages)
  # when the next one is triggered, queue it instead of running both at
  # once -- avoids two runs racing on the same dedupe state.
  group: poll-world-events
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: alerts/state
          key: alerts-state-${{ github.run_id }}
          restore-keys: |
            alerts-state-

      - name: Poll sources and post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ENABLE_USGS: "true"
          ENABLE_GDACS: "true"
          ENABLE_RSS: "true"
          USGS_MIN_MAGNITUDE: "4.5"
          GDACS_MIN_SEVERITY: "2"
          DISCORD_PACE_WINDOW_MINUTES: "45"
        run: python -m alerts.run --sinks discord

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: alerts/state
          key: alerts-state-${{ github.run_id }}
