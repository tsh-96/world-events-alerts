# Manual-only utility: marks every currently-new (not yet posted) event as
# "seen" WITHOUT posting it to Discord, then exits. Use this after the bot
# has been quiet for a while, or whenever you just want to skip a pile of
# old news instead of having it trickle in -- the next normal "Poll world
# events" run will only pick up things that happen from this point on.
name: Clear backlog

on:
  workflow_dispatch: {}

concurrency:
  # Shares the same group as the normal poll so this can never run at the
  # same time as a real poll and race on the same dedupe state.
  group: poll-world-events
  cancel-in-progress: false

jobs:
  clear-backlog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: alerts/state
          key: alerts-state-${{ github.run_id }}
          restore-keys: |
            alerts-state-

      # Same filters as poll.yml -- must match so this marks seen exactly
      # the set of events a normal run would currently consider "new".
      - name: Mark all pending events as seen without posting
        env:
          ENABLE_USGS: "true"
          ENABLE_GDACS: "true"
          ENABLE_RSS: "true"
          USGS_MIN_MAGNITUDE: "4.5"
          GDACS_MIN_SEVERITY: "2"
        run: python -m alerts.run --mark-seen-only

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: alerts/state
          key: alerts-state-${{ github.run_id }}
